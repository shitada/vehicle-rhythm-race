<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea"/>
      <stop offset="50%" style="stop-color:#f8c8dc"/>
      <stop offset="100%" style="stop-color:#ffeaa7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Road -->
  <rect x="0" y="340" width="512" height="172" rx="0" fill="#8B7355"/>
  <rect x="0" y="340" width="512" height="8" fill="#a08b6d"/>
  <!-- Road dashes -->
  <rect x="30" y="410" width="60" height="8" rx="4" fill="rgba(255,255,255,0.4)"/>
  <rect x="140" y="410" width="60" height="8" rx="4" fill="rgba(255,255,255,0.4)"/>
  <rect x="250" y="410" width="60" height="8" rx="4" fill="rgba(255,255,255,0.4)"/>
  <rect x="360" y="410" width="60" height="8" rx="4" fill="rgba(255,255,255,0.4)"/>
  <rect x="470" y="410" width="40" height="8" rx="4" fill="rgba(255,255,255,0.4)"/>
  <!-- Musical notes -->
  <g fill="#5c4a8a" opacity="0.5">
    <text x="80" y="120" font-size="60" font-family="serif">♪</text>
    <text x="200" y="80" font-size="45" font-family="serif">♫</text>
    <text x="350" y="130" font-size="55" font-family="serif">♪</text>
    <text x="420" y="70" font-size="40" font-family="serif">♫</text>
  </g>
  <!-- Vehicle (bus emoji style) -->
  <g transform="translate(120, 240)">
    <!-- Bus body -->
    <rect x="0" y="20" width="140" height="90" rx="15" fill="#FF9800"/>
    <rect x="5" y="30" width="130" height="35" rx="8" fill="#BBDEFB"/>
    <!-- Windows -->
    <rect x="15" y="33" width="35" height="28" rx="5" fill="#E3F2FD"/>
    <rect x="60" y="33" width="35" height="28" rx="5" fill="#E3F2FD"/>
    <rect x="105" y="33" width="22" height="28" rx="5" fill="#E3F2FD"/>
    <!-- Wheels -->
    <circle cx="35" cy="115" r="18" fill="#424242"/>
    <circle cx="35" cy="115" r="8" fill="#757575"/>
    <circle cx="110" cy="115" r="18" fill="#424242"/>
    <circle cx="110" cy="115" r="8" fill="#757575"/>
    <!-- Headlight -->
    <rect x="128" y="75" width="12" height="15" rx="3" fill="#FFEB3B"/>
  </g>
  <!-- Obstacle -->
  <g transform="translate(340, 265)">
    <rect x="0" y="15" width="50" height="60" rx="5" fill="#FF5722"/>
    <rect x="5" y="25" width="40" height="15" rx="3" fill="#FFEB3B"/>
    <rect x="5" y="50" width="40" height="15" rx="3" fill="#FFEB3B"/>
  </g>
  <!-- Jump arc (dotted) -->
  <path d="M 250 340 Q 300 200 350 340" stroke="#5c4a8a" stroke-width="4" stroke-dasharray="8 8" fill="none" opacity="0.4"/>
  <!-- Stars -->
  <text x="280" y="210" font-size="40" opacity="0.7">✨</text>
  <text x="140" y="180" font-size="30" opacity="0.5">⭐</text>
</svg>
